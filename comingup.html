<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Khubziba | Coming Up</title>
<link rel="icon" type="image/x-icon" href="/img/favicon.png">
<style>
.button-container {
  display: flex;
  flex-wrap: wrap;
  gap: 1em;
  justify-content: flex-start;
  padding: 1em;
}

.button {
  font-family: Arial, sans-serif;
  font-weight: bold;
  color: white;
  border: none;
  border-radius: 5px;
  cursor: pointer;
  gap: 5px;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  width: 15em;
  height: 10em;
  padding: 0.5em;
  overflow: hidden;
}

.button:hover {
  filter: brightness(85%);
}

.size {
  font-size: clamp(1em, 1.5em, 2em);
  line-height: 1.2;
  text-align: center;
  white-space: normal;
  overflow-wrap: break-word;
}

.button .platform-info {
  display: flex;
  align-items: center;
  font-size: 1em;
  color: grey;
  gap: 4px;
}

.button .platform-info img {
  height: 15px;
  width: auto;
}
</style>
</head>
<body>

<div class="button-container">
  <button class="button" data-platform="YT vid" data-day="Tomorrow" data-color="#11d2d2">
    <span class="size">POV: You hear scary noises at 3AM (Full video)</span>
  </button>
  <button class="button" data-platform="YT short" data-day="Thursday" data-color="#e64ea2">
    <span class="size">POV: Victorian English be like</span>
  </button>
  <button class="button" data-platform="YT vid" data-day="Saturday, 4th April" data-color="#11d28e">
    <span class="size">1 Year of the YT channel since 4th April, 2025</span>
  </button>
    <button class="button" data-platform="YT short" data-day="Tuesday and Wednesday, 14th and 15th April" data-color="#34dbeb">
    <span class="size">Bengali New Year 1433</span>
  </button>
    <button class="button" data-platform="song" data-day="Coming soon" data-bg="img/Panthera.png">
  <span class="size">PANTHERA</span>
  </button>
  <button class="button" data-platform="book" data-day="Coming soon" data-color="#82b033">
  <span class="size">The Adventures of Henry Gause</span>
  </button>
</div>

<script>
document.querySelectorAll('.button').forEach(btn => {
  const platform = btn.dataset.platform.toLowerCase();
  const container = document.createElement('span');
  container.className = 'platform-info';

  let logoSrc = '';
  let nameText = '';

  if (platform === 'yt vid') {
    logoSrc = 'img/YT logo.png';
    nameText = 'YouTube Video';
  } else if (platform === 'yt short') {
    logoSrc = 'img/YT logo.png';
    nameText = 'YouTube Short';
  } else if (platform === 'book') {
    logoSrc = 'img/Book.png';
    nameText = 'Book';
  } else if (platform === 'song') {
    logoSrc = 'img/Song.jpeg';
    nameText = 'Song';
  }

  // Add logo if exists
  if (logoSrc) {
    const img = document.createElement('img');
    img.src = logoSrc;
    img.alt = nameText + ' Logo';
    container.appendChild(img);
  }

  // Add text
  if (nameText) {
    container.appendChild(document.createTextNode(nameText));
    btn.appendChild(container);
  }
  // To control the day
  if (btn.dataset.day) {
    const daySpan = document.createElement('span');
    daySpan.className = 'release-day';
    daySpan.textContent = btn.dataset.day;
    daySpan.style.fontSize = '0.9em';
    daySpan.style.color = 'grey';
    btn.appendChild(daySpan);
  }

  // Set button color
  if (btn.dataset.color) {
    btn.style.backgroundColor = btn.dataset.color;
  }
  // Background image (optional)
  if (btn.dataset.bg) {
    btn.style.backgroundImage = `url(${btn.dataset.bg})`;
    btn.style.backgroundSize = 'cover';      // fill button
    btn.style.backgroundPosition = 'center'; // center it
  }
});
</script>
</script>

</body>
</html>
